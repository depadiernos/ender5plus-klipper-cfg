# This file contains common pin mappings for the BIGTREETECH SKR mini
# E3 v3.0. for the Ender 5 Plus
# Configured with: CRTouch, Sensorless Homing, Hybrid-CoreXY kinematics, CR10 Display

[include mainsail.cfg]

[bltouch]
sensor_pin: ^PC2 #Remove ^ if print head crashes into bed, the ^ is for the CR touch a bl touch should work without.
control_pin: PA1
x_offset: -42
y_offset: -10
speed: 2.5
samples: 2
sample_retract_dist: 2.0

[safe_z_home]
home_xy_position: 222,190 # Change coordinates to the center of your print bed
speed: 100
z_hop: 10                 # Move up 10mm
z_hop_speed: 5

[bed_screws]
screw1: 72, 60
screw1_name: front left
screw2: 365, 60
screw2_name: front right
screw3: 365, 325
screw3_name: back right
screw4: 72, 325
screw4_name: back left

[screws_tilt_adjust]
screw1: 72, 60
screw1_name: front left
screw2: 362, 60
screw2_name: front right
screw3: 362, 325
screw3_name: back right
screw4: 72, 325
screw4_name: back left
horizontal_move_z: 10
speed: 100
screw_thread: CW-M4

[bed_mesh]
speed: 160
algorithm: bicubic
horizontal_move_z: 5
mesh_min: 50, 50
mesh_max: 300,300
probe_count: 10,10
mesh_pps: 4

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 364
position_max: 364
position_min: 0 # Adjust based on your nozzle/bed
homing_speed: 27
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
stealthchop_threshold: 999999
diag_pin: ^PC0  # Set to ^!PC1 for X
driver_SGTHRS: 68 # Adjust 64-255 (lower = less sensitive)

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 360
position_max: 360
position_min: 0 # Adjust based on your nozzle/bed
homing_speed: 27
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
stealthchop_threshold: 999999
diag_pin: ^PC1  # Set to ^!PC0 for Y
driver_SGTHRS: 68 # Adjust 64-255 (lower = less sensitive)

[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 4
endstop_pin: probe:z_virtual_endstop
position_max: 360
position_min: -5
homing_speed: 5
second_homing_speed: 1
homing_retract_dist: 4

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
hold_current: 0.580
stealthchop_threshold: 999999

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 34.406
gear_ratio: 35:10
pressure_advance: 0.105
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 280

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650
hold_current: 0.500
stealthchop_threshold: 999999

[filament_switch_sensor filament_sensor]
switch_pin:!PC15
pause_on_runout: false #pause handled by macro
runout_gcode:
  #calls a macro with the name M600 (so it can be called by slicers too)
  M600 
insert_gcode:
  #just a throwaway GCode command to have something in this space. You can add your own.
  M117 Filament inserted 
event_delay: 3.0
pause_delay: 0.0001

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
min_temp: 0
max_temp: 130

[heater_fan controller_fan]
pin: PB15
heater: heater_bed
heater_temp: 45.0

[heater_fan nozzle_cooling_fan]
pin: PC7

[fan]
pin: PC6

[mcu]
serial: /dev/ttyAMA0
restart_method: command

[printer]
kinematics: hybrid_corexy
max_velocity: 500
max_accel: 5000
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 3

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

[display]
lcd_type: st7920
cs_pin: PB8
sclk_pin: PB9
sid_pin: PD6
encoder_pins: ^PA10, ^PA9
click_pin: ^!PA15

[output_pin beeper]
pin: PB5

[display_status]

