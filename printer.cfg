# This file contains common pin mappings for the BIGTREETECH SKR mini
# E3 v3.0. for the Ender 5 Plus
# Configured with: CRTouch, Sensorless Homing, Hybrid-CoreXY kinematics, CR10 Display

[include mainsail.cfg]
[include printer-skr.cfg]
[include printer-ebb.cfg]

[temperature_sensor PI]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[safe_z_home]
home_xy_position: 222,190 # Change coordinates to the center of your print bed
speed: 200
z_hop: 10                 # Move up 10mm
z_hop_speed: 5

[screws_tilt_adjust]
screw1: 70, 60
screw1_name: front left
screw2: 362, 60
screw2_name: front right
screw3: 362, 310
screw3_name: back right
screw4: 70, 310
screw4_name: back left
horizontal_move_z: 10
speed: 150
screw_thread: CW-M4

[z_tilt]
z_positions:
    -20, 180    # Lead screw 1 (left) location X,Y
    320, 180    # Lead screw 2 (right) location X,Y
points:
    70, 180     # Probe point 1 (left)
    362, 180    # Probe point 2 (right)
speed: 100
horizontal_move_z: 5
retries: 3
retry_tolerance: 0.0075

[bed_mesh]
speed: 350
algorithm: bicubic
horizontal_move_z: 5
mesh_min: 10, 10
mesh_max: 310, 310
probe_count: 10, 10
mesh_pps: 2, 3

[resonance_tester]
accel_chip: lis2dw
probe_points: 222,190, 20 # Replace with center of your bed (X, Y, Z)
#max_smoothing: 0.10 # Optional

[mcu]
serial: /dev/ttyAMA0
restart_method: command

[mcu ebb]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_4C004D000450534D34323120-if00

[printer]
kinematics: hybrid_corexy
max_velocity: 500
max_accel: 4500
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 3

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

