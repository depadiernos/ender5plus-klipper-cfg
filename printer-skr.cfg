[temperature_sensor MCU]
sensor_type: temperature_mcu
sensor_mcu: mcu
min_temp: 0
max_temp: 100

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 128
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 364
position_max: 364
position_min: 0 # Adjust based on your nozzle/bed
homing_speed: 50
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.800
interpolate: True
stealthchop_threshold: 999999
diag_pin: ^PC0  # Set to ^!PC1 for X
driver_SGTHRS: 68 # Adjust 64-255 (lower = less sensitive)

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 128
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 360
position_max: 360
position_min: 0 # Adjust based on your nozzle/bed
homing_speed: 49
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.800
interpolate: True
stealthchop_threshold: 999999
diag_pin: ^PC1  # Set to ^!PC0 for Y
driver_SGTHRS: 75 # Adjust 64-255 (lower = less sensitive)

[stepper_z]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 4
endstop_pin: probe:z_virtual_endstop
position_max: 360
position_min: -5
homing_speed: 5
second_homing_speed: 1
homing_retract_dist: 4

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.580
hold_current: 0.580
interpolate: True
stealthchop_threshold: 999999

[stepper_z1]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 4

[tmc2209 stepper_z1]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
hold_current: 0.580
interpolate: True
stealthchop_threshold: 999999

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
min_temp: 0
max_temp: 130

[heater_fan controller_fan]
pin: PC6
heater: heater_bed
heater_temp: 45.0